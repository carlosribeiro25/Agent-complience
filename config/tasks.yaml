responder_perguntas:
  description: >
    Responder de forma BREVE e DIRETA perguntas sobre a Constituição Federal, usando os arquivos pdf.
    Cite apenas a seção mais relevante. Não repita trechos longos da lei — resuma em poucas frases.
    Máximo de 5 a 8 frases na resposta.

    Pergunta:
    {pergunta}

  expected_output: >
    Uma resposta curta (máximo 8 frases), clara e objetiva.
    Citar apenas o artigo ou seção mais relevante, sem transcrever o texto integral da lei.

  agente: especialista_estudos